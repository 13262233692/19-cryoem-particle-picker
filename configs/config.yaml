system:
  name: "Cryo-EM Particle Picker"
  version: "1.0.0"
  device: "cuda"
  num_workers: 4
  log_dir: "logs"

io:
  mrc_header_size: 1024
  chunk_size_mb: 32
  zero_copy: true
  supported_modes: [0, 1, 2, 4, 6]

preprocessing:
  clahe:
    clip_limit: 2.0
    tile_grid_size: [8, 8]
  bandpass_filter:
    low_sigma: 50.0
    high_sigma: 1.0
  normalize:
    percentile_low: 0.1
    percentile_high: 99.9
  patch_size: 512
  overlap: 64

model:
  name: "LightResUNet_MSA"
  in_channels: 1
  out_channels: 2
  base_channels: 32
  num_res_blocks: 4
  attention_heads: 4
  attention_channels: 64
  dropout_rate: 0.1
  use_deep_supervision: true

training:
  batch_size: 4
  num_epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.0001
  lr_scheduler: "cosine"
  warmup_epochs: 5
  loss:
    type: "dice_ce"
    dice_weight: 0.5
    ce_weight: 0.5
  data_augmentation:
    random_flip: true
    random_rotation: true
    random_noise: true
    noise_std: 0.01
  checkpoint_dir: "models/checkpoints"
  log_interval: 10
  save_interval: 5
  val_split: 0.2

inference:
  engine: "onnxruntime"
  onnx_model_path: "models/model.onnx"
  use_gpu: true
  intra_op_num_threads: 8
  inter_op_num_threads: 4
  enable_cuda_graph: true
  batch_size: 1
  confidence_threshold: 0.5
  nms_threshold: 0.3
  min_particle_size: 32
  max_particle_size: 256

api:
  host: "0.0.0.0"
  port: 8000
  timeout: 300
  max_upload_size: 1073741824
  cors_origins: ["*"]
  upload_dir: "data/uploads"
  result_dir: "data/results"

postprocessing:
  min_distance: 20
  threshold_abs: 0.5
  exclude_border: 10
  max_particles: 10000
